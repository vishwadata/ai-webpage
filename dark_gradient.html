<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Text Hero</title>
    <style>
        /* Define basic page structure and background */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligns content to the top of the page */
            background-color: #05090e; /* Dark near-black background like the image */
            font-family: Arial, Helvetica, sans-serif; /* A bold sans-serif font */
        }

        /* Container for padding and content centering */
        .gradient-section {
            width: 100%;
            padding: 40px; /* Replicating the spacing around the text */
            text-align: center;
        }

 
        .video-wrap {
            display: flex;
            justify-content: center;
            margin: 24px auto 0;
       }

        /* Text element for gradient application */
        .gradient-heading {
            margin: 0;
            font-size: 3rem; /* Adjust text size as needed */
            font-weight: bold;
            text-transform: capitalize ; /* Matches the text in the image */
            
            /* KEY PART: Create the gradient background */
            background-image: linear-gradient(to right, #30e38a, #20c997, #2097e3, #60a5fa);
            
            /* KEY PART: Clip the background to the text and make the text transparent */
            -webkit-background-clip: text; /* For cross-browser support */
            background-clip: text;
            color: transparent; /* Makes the gradient visible within the letterforms */
            
            /* Slight spacing for a clean look */
            letter-spacing: 0.01em; 
        }
    </style>
</head>
<body>

    

    <section class="gradient-section">
